# ClawCodex upstream-sync configuration
# See docs/UPSTREAM_SYNC_DESIGN-decoupling.md for design rationale.

project_name: "clawcodex"
source_lang: "python"

upstream:
  remote_url: "https://github.com/agentforce314/clawcodex.git"
  main_branch: "main"
  vendor_branch: "upstream/vendor"
  # Use git short commit hash as version tag (e.g. "b125e16")
  version_tag_format: "{commit}"

layers:
  - name: "upstream"
    paths:
      - "src/upstream"
      - "src/upstream/{commit}"
    allowed_imports_from: []
    forbidden_imports_from: []

  - name: "capabilities"
    paths:
      - "src/capabilities"
    allowed_imports_from: []
    forbidden_imports_from:
      - "src.upstream"

  - name: "features"
    paths:
      - "src/orchestrator"
      - "src/api"
      - "src/providers"
      - "src/hooks"
      - "src/permissions"
    allowed_imports_from:
      - "src.capabilities"
    forbidden_imports_from:
      - "src.upstream"
      - "src.agent"
      - "src.tool_system"
      - "src.context_system"

patches:
  # Patches stored per upstream commit hash, e.g. patches/upstream/b125e16/
  directory: "patches/upstream"
  engine: "git-am"           # quilt requires CLI installation; git-am is git-native
  # Per-commit patch subdirectory (recommended for large patch sets)
  # When set, patches are loaded from patches/upstream/{commit}/
  # instead of the flat patches/ directory
  patch_subdir: "patches/upstream/{commit}"
  # Note: the {commit} placeholder is resolved at apply time
  metadata_dir: "patches/metadata/upstream"

sync:
  impact_threshold_auto: "low"
  impact_threshold_agent: "medium"
  report_formats:
    - "json"
    - "markdown"